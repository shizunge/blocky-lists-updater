name: On pull request

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'Dockerfile'
      - 'src/*.sh'
      - 'tests/*.sh'
      - '.github/**'
  workflow_dispatch:
 
jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt install -y bash shellcheck
      - name: Analyse with shellcheck
        run: |
          set -e
          shellcheck -V
          shellcheck src/*.sh tests/*.sh
          set +e

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Install shellspec
        run: |
          mkdir -p ~/shellspec
          cd ~/shellspec
          git clone https://github.com/shellspec/shellspec.git
          ln -s ~/shellspec/shellspec/shellspec /usr/local/bin/shellspec
          echo -n "shellspec version: "
          shellspec --version
      - name: Install libraries
        run: |
          sudo apt install -y inotify-tools
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Run container tests
        run: |
          NUM_JOBS=$(ls -1 tests | wc -l)
          shellspec -s bash --jobs "${NUM_JOBS}"
