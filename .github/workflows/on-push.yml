name: On push

on:
  push:
    branches-ignore:
      - release
      - dependabot/**
    paths:
      - 'Dockerfile'
      - 'src/*.sh'
      - 'tests/*.sh'
      - '.github/**'
  workflow_dispatch:

env:
  PLATFORMS: "linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64"
  
jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y bash shellcheck
      - name: Analyse with shellcheck
        run: |
          set -e
          shellcheck -V
          shellcheck src/*.sh
          set +e

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Install shellspec
        run: |
          mkdir -p ~/shellspec
          cd ~/shellspec
          git clone https://github.com/shellspec/shellspec.git
          ln -s ~/shellspec/shellspec/shellspec /usr/local/bin/shellspec
          echo -n "shellspec version: "
          shellspec --version
      - name: Install libraries
        run: |
          sudo apt install -y inotify-tools
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Run tests
        run: |
          NUM_JOBS=$(ls -1 tests | wc -l)
          shellspec -s bash --jobs "${NUM_JOBS}"

  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    needs:
      - shellcheck
      - test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ github.repository }}-development
            ghcr.io/${{ github.repository }}-development
          tags: |
            type=raw,value=dev-{{date 'X'}}
            type=raw,value=latest
            type=ref,event=branch
            type=edge,branch=main
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

